<title>Figurinhas · Copa 2026 · Martin</title>
<style>
  :root{
    --navy:#0E2A47; --navy2:#16395f; --pitch:#138A5E; --pitch-d:#0d6c49;
    --paper:#EDF0F4; --card:#ffffff; --line:#D3DBE6; --ink:#0E2A47;
    --amber:#F4B43A; --mute:#7A8AA0; --falta-bd:#C6D1E0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--paper); color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-font-smoothing:antialiased;
  }
  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy2) 100%);
    color:#fff; padding:calc(env(safe-area-inset-top) + 12px) 16px 14px;
    box-shadow:0 2px 14px rgba(14,42,71,.28);
  }
  .topbar{display:flex; align-items:center; gap:11px}
  .avatar{width:50px; height:50px; flex:none; filter:drop-shadow(0 2px 5px rgba(0,0,0,.4))}
  .brand{display:flex; flex-direction:column; gap:1px; font-weight:800; letter-spacing:-.2px}
  .brand .b1{font-size:18px}
  .brand .b2{font-size:13px; font-weight:600; color:#aebfd6; letter-spacing:.3px}
  .score{display:flex; align-items:flex-end; gap:10px; margin-top:10px}
  .score .big{font-size:40px; font-weight:850; line-height:.9; font-variant-numeric:tabular-nums}
  .score .big small{font-size:16px; font-weight:700; color:#aebfd6}
  .score .pct{margin-left:auto; text-align:right}
  .score .pct b{font-size:24px; font-weight:850; color:var(--amber); font-variant-numeric:tabular-nums}
  .score .pct span{display:block; font-size:11px; color:#aebfd6; font-weight:600}
  .track{height:9px; border-radius:6px; background:rgba(255,255,255,.16); margin-top:11px; overflow:hidden}
  .fill{height:100%; width:0; border-radius:6px;
    background:linear-gradient(90deg,var(--pitch) 0%, #2fbd84 100%); transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .subline{font-size:12px; color:#aebfd6; margin-top:7px; font-weight:600}
  /* ---------- CONTROLS ---------- */
  .controls{position:sticky; top:0; z-index:10; background:var(--paper); padding:10px 12px 6px; border-bottom:1px solid var(--line)}
  .seg{display:flex; background:#dde4ee; border-radius:11px; padding:3px; gap:3px}
  .seg button{flex:1; border:0; background:transparent; padding:9px 4px; border-radius:8px;
    font-weight:700; font-size:14px; color:var(--mute); cursor:pointer}
  .seg button.on{background:#fff; color:var(--navy); box-shadow:0 1px 3px rgba(14,42,71,.18)}
  .row2{display:flex; gap:8px; margin-top:8px}
  .search{flex:1; position:relative}
  .search input{width:100%; border:1px solid var(--line); background:#fff; border-radius:10px;
    padding:10px 12px 10px 34px; font-size:15px; color:var(--ink); outline:none}
  .search input:focus{border-color:var(--pitch)}
  .search svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); width:16px; height:16px; fill:var(--mute)}
  .iconbtn{border:1px solid var(--line); background:#fff; border-radius:10px; padding:0 13px; font-size:13px;
    font-weight:700; color:var(--navy); cursor:pointer; display:flex; align-items:center; gap:6px}
  .iconbtn.act{background:var(--navy); color:#fff; border-color:var(--navy)}
  /* ---------- LIST ---------- */
  main{padding:10px 12px 30px}
  .ghdr{display:flex; align-items:center; gap:8px; margin:16px 4px 7px; font-size:12px;
    font-weight:800; letter-spacing:1.4px; color:var(--mute); text-transform:uppercase}
  .ghdr::after{content:""; flex:1; height:1px; background:var(--line)}
  .ghdr:first-child{margin-top:4px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px 12px;
    margin-bottom:8px; box-shadow:0 1px 2px rgba(14,42,71,.05)}
  .chead{display:flex; align-items:center; gap:9px}
  .flag{font-size:22px; line-height:1; width:26px; text-align:center; flex:none}
  .nm{font-weight:750; font-size:15.5px; flex:1; min-width:0}
  .nm .cod{color:var(--mute); font-weight:700; font-size:12.5px}
  .badge{flex:none; font-size:12px; font-weight:800; color:var(--pitch-d); background:#e4f4ec;
    border-radius:20px; padding:3px 9px; font-variant-numeric:tabular-nums}
  .badge.zero{color:var(--pitch); background:#dff3e8}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px}
  .chip{min-width:40px; height:40px; padding:0 6px; border-radius:10px; border:1.5px solid var(--falta-bd);
    background:#fff; color:var(--navy); font-weight:800; font-size:16px; font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none;
    transition:transform .12s ease, background .15s ease, color .15s ease, border-color .15s ease; position:relative}
  .chip:active{transform:scale(.88)}
  .chip.got{background:var(--pitch); border-color:var(--pitch); color:#fff; box-shadow:0 2px 6px rgba(19,138,94,.35)}
  .chip.got::after{content:"✓"; position:absolute; top:-4px; right:-4px; width:16px; height:16px; font-size:11px;
    background:var(--amber); color:#3a2a00; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:900; box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .chip.pop{animation:pop .32s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(.7) rotate(-6deg)}55%{transform:scale(1.18) rotate(3deg)}100%{transform:scale(1)}}
  .hideGot .chip.got{display:none}
  .done .chips{display:none}
  .done{background:#f2faf5; border-color:#cdeadb}
  .donetag{flex:none; font-size:12px; font-weight:800; color:var(--pitch); display:flex; align-items:center; gap:4px}
  .empty{text-align:center; color:var(--mute); padding:40px 20px; font-weight:600}
  /* ---------- FOOTER ---------- */
  footer{text-align:center; padding:18px 16px 30px; color:var(--mute); font-size:12px; font-weight:600}
  footer button{background:none; border:0; color:var(--mute); text-decoration:underline; cursor:pointer; font-size:12px; font-weight:600}
  /* ---------- TOAST ---------- */
  #toast{position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 22px); transform:translateX(-50%) translateY(20px);
    background:var(--navy); color:#fff; padding:11px 18px; border-radius:24px; font-weight:700; font-size:14px;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:50; box-shadow:0 6px 20px rgba(0,0,0,.3)}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){ .chip,.fill,.chip.pop{transition:none; animation:none} }

  /* ---------- HERO (capa) ---------- */

    <button class="iconbtn" id="copy">⧉ Copiar</button>
  </div>
</div>

<main id="list"></main>

  Toque no número quando colar. Salva sozinho neste aparelho.<br>
  <button id="share">⤴ Enviar progresso (link)</button> · <button id="reset">Recomeçar do zero</button>
</footer>

<script src="config.js"></script>
<script>
const TEAMS = [

 {g:'I',n:'Senegal',c:'SEN',f:'🇸🇳',m:[]},
 {g:'I',n:'Iraque',c:'IRQ',f:'🇮🇶',m:[4,7,8,11,14,16]},
 {g:'I',n:'Noruega',c:'NOR',f:'🇳🇴',m:[2,3,9,18]},

 {g:'J',n:'Áustria',c:'AUT',f:'🇦🇹',m:[7,17]},
 {g:'J',n:'Jordânia',c:'JOR',f:'🇯🇴',m:[4,5,8,9,11,12,16,17,20]},
 {g:'K',n:'Portugal',c:'POR',f:'🇵🇹',m:[3,10,11,15,17]},
 {g:'K',n:'Congo',c:'COD',f:'🇨🇩',m:[1,4,7,10,12,13,15]},
 {g:'K',n:'Uzbequistão',c:'UZB',f:'🇺🇿',m:[1,3,4,9,10,12,14,15]},
 {g:'K',n:'Colômbia',c:'COL',f:'🇨🇴',m:[1,2,3,5,10,11,15,16,17]},
 {g:'L',n:'Inglaterra',c:'ENG',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',m:[3,7,9,18,20]},
 {g:'L',n:'Croácia',c:'CRO',f:'🇭🇷',m:[1,3,5,11,18]},
 {g:'L',n:'Gana',c:'GHA',f:'🇬🇭',m:[1,14]},
 {g:'L',n:'Panamá',c:'PAN',f:'🇵🇦',m:[12]},
 {g:'★',n:'Página inicial',c:'FWC',f:'🏆',m:[3,5,7,8]},
 {g:'★',n:'FIFA World Cup History',c:'FWCH',cod:'FWC',f:'🏆',m:[17]},
 {g:'★',n:'Coca-Cola',c:'CC',f:'🥤',m:[]},
];
const TOTAL_ALBUM = 980;
const KEY = 'wc26-martin-v1';

// storage: usa window.storage (app Claude) e cai pra localStorage (Safari/standalone)
const Store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k, false); return r ? r.value : null; } }catch(e){}
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k, v, false); return; } }catch(e){}
    try{ localStorage.setItem(k, v); }catch(e){}
  }
};

let got = {};           // { COD: [numeros colados no app] }
let syncRef = null;
let view = 'az';
let query = '';
let showGot = true;
const noaccent = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const sortedAZ = [...TEAMS].filter(t=>t.g!=='★').sort((a,b)=>noaccent(a.n).localeCompare(noaccent(b.n),'pt'));
const specials = TEAMS.filter(t=>t.g==='★');

function encodeState(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function decodeState(str){ try{ return JSON.parse(decodeURIComponent(escape(atob(str)))); }catch(e){ return null; } }
async function load(){
  render();                       // mostra a lista IMEDIATO
  if(initSync()){                 // 1) modo sincronizado (firebase) - tempo real entre aparelhos
    if(location.hash.indexOf('#s=')===0){ const fh=decodeState(location.hash.slice(3)); if(fh){ for(const c in fh){ (fh[c]||[]).forEach(n=>{ try{ syncRef.child(c+'/'+n).set(true); }catch(e){} }); } try{ history.replaceState(null,'',location.pathname); }catch(e){} } }
    return;
  }
  // 2) fallback local (por aparelho)
  let fromHash = (location.hash.indexOf('#s=')===0) ? decodeState(location.hash.slice(3)) : null;
  if(fromHash){ got = fromHash; render(); try{ await save(); }catch(e){} try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){} return; }
  try{
    const raw = await Promise.race([ Store.get(KEY), new Promise(r=>setTimeout(()=>r('__timeout'),1500)) ]);
    if(raw && raw!=='__timeout'){ try{ got = JSON.parse(raw); render(); }catch(e){} }
  }catch(e){}
}
async function shareProgress(){
  const link = location.origin + location.pathname + '#s=' + encodeState(got);
  try{ if(navigator.share){ await navigator.share({title:'Figurinhas do Martin', text:'Progresso atual do álbum 📒⚽', url:link}); return; } }
  catch(e){ if(e && e.name==='AbortError') return; }
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(link).then(()=>toast('Link copiado ✓')).catch(()=>fallbackCopy(link,()=>toast('Link copiado ✓'))); }
  else fallbackCopy(link,()=>toast('Link copiado ✓'));
}
async function save(){ if(syncRef) return; await Store.set(KEY, JSON.stringify(got)); }
function gotFromSnap(v){ const g={}; v=v||{}; for(const c in v){ const a=Object.keys(v[c]||{}).filter(k=>v[c][k]).map(Number); if(a.length) g[c]=a; } return g; }
function setSyncBadge(on){ const el=document.getElementById('synced'); if(el) el.textContent = on ? ' · ☁ sincronizado' : ''; }
function initSync(){
  if(!(window.SYNC_CONFIG && window.firebase)) return false;
  try{
    if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(window.SYNC_CONFIG);
    syncRef = firebase.database().ref('album');
    syncRef.on('value', s=>{ got = gotFromSnap(s.val()); setSyncBadge(true); render(); }, ()=>{ setSyncBadge(false); });
    return true;
  }catch(e){ syncRef=null; setSyncBadge(false); return false; }
}

function remaining(t){ const g = got[t.c]||[]; return t.m.filter(n=>!g.includes(n)); }
function totalRemaining(){ return TEAMS.reduce((s,t)=>s+remaining(t).length,0); }

function setProgress(){
  const rem = totalRemaining();
  const colado = TOTAL_ALBUM - rem;
  const pct = Math.round(colado/TOTAL_ALBUM*100);
  document.getElementById('colado').innerHTML = colado + '<small> / 980 coladas</small>';
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('fill').style.width = pct + '%';
  const completas = TEAMS.filter(t=>remaining(t).length===0).length;
  document.getElementById('sub').textContent = `${rem} faltando · ${completas} coleções completas`;
}

function chip(code, n){
  const g = got[code]||[];
  const on = g.includes(n);
  return `<div class="chip ${on?'got':''}" data-c="${code}" data-n="${n}">${n}</div>`;
}
function card(t){
  const rem = remaining(t);
  const done = t.m.length>0 && rem.length===0;
  const noneEver = t.m.length===0;
  const cod = t.cod || t.c;
  const badge = (done||noneEver)
    ? `<span class="donetag">✓ completa</span>`
    : `<span class="badge">${rem.length}</span>`;
  let chips = '';
  if(noneEver){
    return `<div class="card done"><div class="chead"><span class="flag">${t.f}</span><span class="nm">${t.n} <span class="cod">(${cod})</span></span>${badge}</div></div>`;
  }
  chips = `<div class="chips">${t.m.map(n=>chip(t.c,n)).join('')}</div>`;
  return `<div class="card ${done?'done':''}"><div class="chead"><span class="flag">${t.f}</span><span class="nm">${t.n} <span class="cod">(${cod})</span></span>${badge}</div>${chips}</div>`;
}

function render(){
  setProgress();
  const list = document.getElementById('list');
  list.className = showGot ? '' : 'hideGot';
  const match = t => !query || noaccent(t.n).includes(query) || (t.cod||t.c).toLowerCase().includes(query);
  let html = '';
  if(view==='az'){
    const items = sortedAZ.filter(match);
    html += items.map(card).join('');
    const sp = specials.filter(match);
    if(sp.length){ html += `<div class="ghdr">Especiais</div>` + sp.map(card).join(''); }
    if(!items.length && !sp.length) html = `<div class="empty">Nenhum país com esse nome.</div>`;
  } else {
    const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
    let any = false;
    groups.forEach(g=>{
      const items = TEAMS.filter(t=>t.g===g && match(t));
      if(items.length){ any=true; html += `<div class="ghdr">Grupo ${g}</div>` + items.map(card).join(''); }
    });
    const sp = specials.filter(match);
    if(sp.length){ any=true; html += `<div class="ghdr">Especiais</div>` + sp.map(card).join(''); }
    if(!any) html = `<div class="empty">Nenhum país com esse nome.</div>`;
  }
  list.innerHTML = html;
}

function tapChip(el){
  const code = el.dataset.c, n = +el.dataset.n;
  if(!got[code]) got[code]=[];
  const i = got[code].indexOf(n);
  const willHave = (i<0);
  if(willHave){ got[code].push(n); el.classList.add('got','pop'); setTimeout(()=>el.classList.remove('pop'),320); }
  else { got[code].splice(i,1); el.classList.remove('got'); }
  // atualiza badge/estado do card sem re-render completo
  const card = el.closest('.card');
  const rem = TEAMS.find(t=>t.c===code).m.filter(x=>!got[code].includes(x));
  const badge = card.querySelector('.badge');
  if(badge) badge.textContent = rem.length;
  if(rem.length===0){ card.classList.add('done'); }
  else card.classList.remove('done');
  setProgress();
  if(syncRef){ try{ syncRef.child(code+'/'+n).set(willHave ? true : null); }catch(e){} }
  else save();
}

document.getElementById('list').addEventListener('click', e=>{
  const c = e.target.closest('.chip'); if(c) tapChip(c);
});
document.querySelectorAll('.seg button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); view=b.dataset.view; render();
}));
document.getElementById('q').addEventListener('input',e=>{ query=noaccent(e.target.value.trim()); render(); });
document.getElementById('toggleGot').addEventListener('click',e=>{
  showGot=!showGot; e.currentTarget.classList.toggle('act',!showGot);
  e.currentTarget.innerHTML = showGot? '👁 Coladas' : '🙈 Coladas';
  render();
});
document.getElementById('copy').addEventListener('click',copyFaltantes);
document.getElementById('share').addEventListener('click',shareProgress);
document.getElementById('reset').addEventListener('click',()=>{
  if(confirm('Recomeçar do zero? Isso apaga todas as marcações feitas no app (volta ao estado inicial).')){
    got={}; save(); render(); toast('Zerado');
  }
});

function copyFaltantes(){
  let out = '⚽ FALTANTES — Copa 2026 (Martin)\n\n';
  const lines = sortedAZ.concat(specials).map(t=>{
    const rem = remaining(t);
    if(t.m.length===0 || rem.length===0) return `${t.f} ${t.n} (${t.cod||t.c}): ✅ completa`;
    return `${t.f} ${t.n} (${t.cod||t.c}): ${rem.join(', ')}`;
  });
  out += lines.join('\n');
  out += `\n\n📊 ${totalRemaining()} faltando · ${Math.round((TOTAL_ALBUM-totalRemaining())/TOTAL_ALBUM*100)}% completo`;
  const done = ()=>toast('Lista copiada ✓');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(out).then(done).catch(()=>fallbackCopy(out,done));
  } else fallbackCopy(out,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); cb(); }catch(e){ toast('Não consegui copiar'); }
  document.body.removeChild(ta);
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1600);
}

load();
</script>
